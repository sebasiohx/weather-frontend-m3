<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App del clima</title>

    <!-- CSS Bootrstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS local -->
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg bg-info sticky-top">
      <div class="container-fluid">
        <a class="btn-home navbar-brand fw-bold" href="#"
          ><i class="fa-solid fa-cloud-sun me-2"></i>Clima de Chile</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto">
            <a class="btn-home nav-link active" aria-current="page" href="#"
              >Home</a
            >
            <a class="nav-link" href="#">Acerca de</a>
          </div>
        </div>
      </div>
    </nav>

    <header id="hero-section" class="py-5 px-2 px-md-0"></header>

    <main class="d-flex flex-column flex-grow-1">
      <section id="vista-home" class="py-4 py-md-5">
        <h2 class="text-center display-5 mb-5">
          Seleccione una de las siguientes ciudades
        </h2>
        <div class="container">
          <div id="regiones-container" class="row mt-0 g-4"></div>
        </div>
      </section>

      <section id="vista-detalle" class="py-5 flex-grow-1 d-none">
        <div class="container">
          <div class="row">
            <div class="col-10 offset-1 col-lg-8 offset-lg-2">
              <button class="btn btn-home btn-outline-light mb-4">
                <i class="fa-solid fa-arrow-left"></i> Volver al catalogo
              </button>

              <article id="detalle-container"></article>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="bg-info-subtle text-center py-4">
      <div class="container">
        <p class="mb-0">
          <i class="fa-solid fa-cloud-sun me-2"></i>Clima de Chile &copy;2026
        </p>
      </div>
    </footer>

    <!-- JS Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- JS local -->
    <script src="./assets/js/main.js"></script>
  </body>
</html>
